name: Auto-build dist

# When source changes land on main without a corresponding dist/ update, rebuild
# and commit. CI's dist-drift check fails PRs that skip this; this workflow is
# the safety net for direct pushes to main.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

jobs:
  build:
    # Skip when the previous run already pushed a rebuild (avoid loops).
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Commit dist/ if changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain dist/)" ]; then
            echo "dist/ already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: rebuild dist/ [skip ci]"
          git push
