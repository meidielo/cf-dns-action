version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    # Scoped ignores: allow minor + patch (where security fixes land) but
    # defer major bumps that require migration work.
    ignore:
      # Blocked on ncc CJS -> ESM bundle migration (v1.1.0 scope).
      - dependency-name: "@actions/core"
        update-types: ["version-update:semver-major"]
      # zod v4 has breaking API changes; migration pending.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 is a real breaking change; defer until actively planned.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # @types/node major should track the engines.node runtime (currently 24).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # eslint 10 just landed (2026-04); no urgency, stability first.
      # Revisit once the 10.x line has a couple of patch releases.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # v3 requires Node 24 action runtime. Revisit once Node 24 is confirmed
      # standard on ubuntu-latest (https://github.com/actions/runner-images).
      - dependency-name: "softprops/action-gh-release"
        update-types: ["version-update:semver-major"]
